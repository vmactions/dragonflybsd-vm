      with:
        envs: 'DEBUG MYTOKEN MYTOKEN2'
        prepare: |
          pkg install -y socat
        mem: 4096
        release: ${{ matrix.release }}
        arch: ${{ matrix.arch }}
        nat: |
          "20022": "22"
          "8080": "80"
          "8443": "443"
          udp:"8081": "80"
        usesh: true
        debug: true
        debug-on-error: ${{ vars.DEBUG_ON_ERROR }}
        sync: nfs
        run: |
          ls -lah $HOME/work
          if [ -z "$(ls -A $HOME/work)" ]; then
            echo "nfs error."
            exit 1
          fi
          env
          echo "TEST_ENV=abc" >>${GITHUB_ENV}
          echo "textfromvm" >$GITHUB_WORKSPACE/vm.txt
          pwd
          ls -lah
          whoami
          env
          uname -a
          echo "OK"

    - name: Test NAT
      if: ${{ contains(fromJSON('')[matrix.arch == '' && 'x86_64' || matrix.arch], 'nfs') }}
      env:
        VM_USER: ""
      run: |
        set -e
        [ -e "$GITHUB_WORKSPACE/vm.txt" ];
        cat "$GITHUB_WORKSPACE/vm.txt";
        grep "textfromvm" $GITHUB_WORKSPACE/vm.txt;
        echo "TEST_ENV=$TEST_ENV"
        [ "$TEST_ENV" = "abc" ]
        ssh -v -p 20022 ${VM_USER:-root}@localhost "uname -a;whoami;pwd"
    - name: Test custom shell
      if: ${{ contains(fromJSON('')[matrix.arch == '' && 'x86_64' || matrix.arch], 'nfs') }}
      shell: dragonflybsd {0}
      run: |
        pwd
          pwd
          ls -lah
          whoami
