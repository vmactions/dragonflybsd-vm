          - runs: "ubuntu-24.04-arm"
            arch: "powerpc64"
          - runs: "ubuntu-24.04-arm"
            arch: "sparc64"
          - runs: "ubuntu-24.04-arm"
            arch: "ppc64le"
          - runs: "ubuntu-24.04-arm"
            arch: "s390x"
